services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fb-scraper-backend
    init: true
    shm_size: "2gb"
    environment:
      TZ: Asia/Jakarta
      FB_API_HOST: 0.0.0.0
      FB_API_PORT: 8003
      FB_PUBLIC_URL: ${FB_PUBLIC_URL:-http://backend:8003}
      FB_HEADLESS: "true"
      FB_BROWSER_CHANNEL: ""
      FB_BLOCK_HEAVY_RESOURCES: ${FB_BLOCK_HEAVY_RESOURCES:-true}
      FB_DEEP_FAST_DETAIL_ENRICH_LIMIT: ${FB_DEEP_FAST_DETAIL_ENRICH_LIMIT:-60}
      FB_DETAIL_WAIT_SECONDS: ${FB_DETAIL_WAIT_SECONDS:-2.0}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://frontend:3000}
      SENTIMENT_MODE: rule_only
      GEMINI_ENABLED: "False"
    ports:
      - "${BACKEND_PORT:-8003}:8003"
    volumes:
      - ./backend/session:/app/backend/session
      - ./backend/fb_chrome_real_profile:/app/backend/fb_chrome_real_profile
      - ./backend/output_facebook:/app/backend/output_facebook
      - ./backend/output_fb_profiles:/app/backend/output_fb_profiles
      - ./backend/data_fb_profiles:/app/backend/data_fb_profiles
      - ./backend/fb_deep_jobs:/app/backend/fb_deep_jobs
      - ./backend/fb_keyword_debug:/app/backend/fb_keyword_debug
      - ./backend/fb_post_debug:/app/backend/fb_post_debug
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port=os.getenv('FB_API_PORT', '8003'); urllib.request.urlopen(f'http://127.0.0.1:{port}/api/v1/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8003}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
        NEXT_PUBLIC_BACKEND_LABEL: ${NEXT_PUBLIC_BACKEND_LABEL:-/api/v1}
    container_name: fb-scraper-frontend
    environment:
      TZ: Asia/Jakarta
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8003}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
      NEXT_PUBLIC_BACKEND_LABEL: ${NEXT_PUBLIC_BACKEND_LABEL:-/api/v1}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
